<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexia – Scenario, Wekelijks Logboek, Bewijs & Roadmap</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .app { min-height: 100vh; background: #F5F6F3; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const INK = "#22302A";
const PAPER = "#F5F6F3";
const CARD = "#FFFFFF";
const MIST = "#EDF0EC";
const SLATE = "#5E6B62";
const RED = "#C96058";
const REDT = "#F4E3E0";
const GREEN = "#157A41";
const GREENT = "#E4F0E9";
const ICE = "#C9D6CC";
const LINEC = "#E1E7E1";
const VERSION = "v0.8";

const today = () => new Date().toISOString().slice(0, 10);
const dayStr = (offset) => { const d = new Date(); d.setDate(d.getDate() - offset); return d.toISOString().slice(0, 10); };
const uid = () => Math.random().toString(36).slice(2, 9);

const store = {
  get: (key, fallback) => {
    try {
      const r = localStorage.getItem(key);
      return r ? JSON.parse(r) : fallback;
    } catch { return fallback; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }
};

const CODE = `Kern: maatschappelijke opgaven stranden niet op ideeën maar op het onvermogen de condities te scheppen waaronder handelen lukt. De kwartiermaker is een betrokken buitenstaander die die condities schept.
Zeven dimensies: opgave, opdrachtgever, governance, positie kwartiermaker, tempo, leren, borging.
Sterkste bevindingen: relationeel werken is primair. De kwaliteit van opdrachtgeverschap is beste voorspeller. Investeer in voorfase.
Friso's opschaling: 3 scenario's. A: boutique (laag risico). B: private vliegwiel (hoog risico). C: publieke fundament (laag-midden risico).`;

const STYLE = `Schrijf in het Nederlands, kort en concreet. Je bent Alexia, betrokken buitenstaander, scherp en zonder eigen agenda.`;

const SLIDERS = [
  { key: "ambitie", label: "Ambitie", left: "Een mooie praktijk", right: "Een groot bedrijf" },
  { key: "risico", label: "Risicobereidheid", left: "Laag", right: "Hoog" },
  { key: "investering", label: "Investering", left: "Minimal", right: "Fors" },
  { key: "loslaten", label: "Zelf in de kamer", left: "Zelf blijven leveren", right: "Loslaten" },
  { key: "horizon", label: "Tijdshorizon", left: "Snel", right: "Lange adem" },
];

async function callClaude(system, user) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": prompt("Voer je Anthropic API key in:") || "" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system, messages: [{ role: "user", content: user }] }),
  });
  if (!res.ok) throw new Error("API fout. Controleer je API key.");
  const data = await res.json();
  return (data.content || []).map((b) => b.type === "text" ? b.text : "").join("").trim();
}

function parseJSON(text) {
  const start = text.indexOf("{");
  if (start === -1) throw new Error("Geen JSON in antwoord.");
  let t = text.slice(start);
  const tryParse = (c) => { try { return JSON.parse(c); } catch { return undefined; } };
  let r = tryParse(t);
  if (r) return r;
  const end = t.lastIndexOf("}");
  if (end !== -1) r = tryParse(t.slice(0, end + 1));
  if (r) return r;
  throw new Error("Kon JSON niet parsen.");
}

function KwartierMark({ size = 36 }) {
  return <svg viewBox="8 12 104 104" width={size} height={size} style={{ display: "block" }}>
    <path d="M60,64 L106,64 A46,46 0 1,1 60,18 Z" fill={GREEN} />
    <path d="M64,60 L102,60 A38,38 0 0,0 64,22 Z" fill={RED} />
  </svg>;
}

function AlexiaAvatar({ size = 44 }) {
  return <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: "block", borderRadius: "50%", flex: "none" }}>
    <circle cx="50" cy="50" r="50" fill="#E4F0E9" />
    <path d="M16,100 C16,79 31,71 50,71 C69,71 84,79 84,100 Z" fill={INK} />
    <ellipse cx="50" cy="47" rx="23" ry="24" fill="#6E4A2C" />
    <circle cx="50" cy="49" r="17.5" fill="#E8C6A0" />
    <circle cx="43" cy="49.5" r="1.8" fill={INK} />
    <circle cx="57" cy="49.5" r="1.8" fill={INK} />
    <path d="M44.5,58 Q50,62 55.5,58" stroke={RED} strokeWidth="2.2" fill="none" strokeLinecap="round" />
  </svg>;
}

function Tab({ id, tab, setTab, children }) {
  const on = tab === id;
  return <button onClick={() => setTab(id)} style={{ padding: "10px 14px", background: on ? PAPER : "transparent", color: on ? INK : ICE, border: "none", fontSize: "14px", fontWeight: "600", borderTopLeftRadius: "8px", borderTopRightRadius: "8px", cursor: "pointer" }}>
    {children}
  </button>;
}

function Segmented({ value, onChange }) {
  return <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
    {[1, 2, 3, 4, 5].map((n) => (
      <button key={n} onClick={() => onChange(n)} style={{ flex: 1, padding: "9px 0", background: value === n ? RED : MIST, color: value === n ? "#FFFFFF" : SLATE, border: `1px solid ${value === n ? RED : LINEC}`, borderRadius: "8px", fontSize: "14px", fontWeight: "600", cursor: "pointer" }}>
        {n}
      </button>
    ))}
  </div>;
}

function Field({ label, value, onChange, placeholder, rows }) {
  return <div style={{ marginBottom: "16px" }}>
    <div style={{ fontSize: "14px", fontWeight: "600", marginBottom: "8px", color: INK }}>{label}</div>
    <textarea value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder || ""} rows={rows || 2} style={{ width: "100%", borderRadius: "8px", fontSize: "14px", padding: "12px", background: MIST, border: `1px solid ${LINEC}`, color: INK, outline: "none", fontFamily: "inherit", resize: "vertical" }} />
  </div>;
}

function Block({ title, color, items }) {
  if (!items || items.length === 0) return null;
  return <div style={{ marginBottom: "12px" }}>
    <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", marginBottom: "8px", color: SLATE }}>{title.toUpperCase()}</div>
    {(items || []).map((t, i) => (
      <div key={i} style={{ display: "flex", gap: "8px", marginBottom: "8px", alignItems: "flex-start" }}>
        <span style={{ flex: "none", borderRadius: "50%", width: "7px", height: "7px", marginTop: "7px", background: color }} />
        <span style={{ fontSize: "14px", color: INK }}>{t}</span>
      </div>
    ))}
  </div>;
}

function ScenarioIntake({ a, set, loading, error, onGenerate }) {
  return <div>
    <div style={{ background: CARD, borderRadius: "12px", border: `0.5px solid ${LINEC}`, padding: "24px", marginBottom: "20px", boxShadow: "0 1px 3px rgba(34,48,42,0.08)" }}>
      <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", marginBottom: "12px", color: RED }}>JOUW HONGER</div>
      <p style={{ fontSize: "14px", marginBottom: "20px", color: SLATE }}>Dit deel kan niemand voor je invullen.</p>
      {SLIDERS.map((s) => (
        <div key={s.key} style={{ marginBottom: "20px" }}>
          <div style={{ fontSize: "14px", fontWeight: "600", color: INK }}>{s.label}</div>
          <Segmented value={a[s.key]} onChange={(n) => set(s.key, n)} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: "8px", fontSize: "12px", color: SLATE }}>
            <span>{s.left}</span><span style={{ textAlign: "right", maxWidth: "55%" }}>{s.right}</span>
          </div>
        </div>
      ))}
    </div>
    {error && <div style={{ background: REDT, color: "#8C3A33", borderRadius: "8px", padding: "16px", marginBottom: "16px", fontSize: "14px" }}>{error}</div>}
    <button onClick={onGenerate} disabled={loading} style={{ width: "100%", padding: "15px 0", background: loading ? "#D9988F" : RED, color: "#FFFFFF", border: "none", borderRadius: "12px", fontSize: "16px", fontWeight: "600", cursor: loading ? "default" : "pointer" }}>
      {loading ? "Alexia stelt je scherp..." : "Vraag Alexia om diagnose"}
    </button>
  </div>;
}

function ScenarioResult({ result }) {
  return <div>
    <div style={{ background: INK, borderRadius: "12px", padding: "24px", marginBottom: "20px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
        <AlexiaAvatar size={28} />
        <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", color: "#E8B0AA" }}>DIAGNOSE</div>
      </div>
      <p style={{ fontSize: "16px", lineHeight: "1.6", color: "#FFFFFF" }}>{result.diagnose}</p>
    </div>
    <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", marginBottom: "12px", paddingLeft: "8px", color: SLATE }}>SCENARIO'S</div>
    <div style={{ display: "grid", gap: "16px", marginBottom: "20px" }}>
      {(result.scenarios || []).map((sc) => (
        <div key={sc.id} style={{ background: CARD, border: `0.5px solid ${LINEC}`, borderRadius: "12px", padding: "20px", boxShadow: "0 1px 3px rgba(34,48,42,0.06)" }}>
          <div style={{ fontSize: "14px", fontWeight: "600", marginBottom: "8px", color: INK }}>{sc.naam}</div>
          <p style={{ fontSize: "13px", marginBottom: "12px", color: SLATE }}>{sc.essentie}</p>
          <p style={{ fontSize: "12px", color: SLATE }}><span style={{ fontWeight: "600", color: INK }}>Fit: </span>{sc.fit}</p>
        </div>
      ))}
    </div>
  </div>;
}

function WeeklijksLogboek({ draft, setD, onReflect, refLoading, refError, entries, onDelete, loaded, recap, onRecap, recapLoading, recapError, aantalRecent }) {
  return <div>
    <div style={{ background: CARD, borderRadius: "12px", border: `0.5px solid ${LINEC}`, padding: "24px", marginBottom: "24px", boxShadow: "0 1px 3px rgba(34,48,42,0.08)" }}>
      <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", marginBottom: "8px", color: RED }}>NOTITIE VAN VANDAAG</div>
      <p style={{ fontSize: "14px", marginBottom: "16px", color: SLATE }}>Wat speelt deze week? Voortgang, blockers, lessen.</p>
      <div style={{ display: "flex", gap: "12px", marginBottom: "16px" }}>
        <div style={{ width: "150px" }}>
          <div style={{ fontSize: "14px", fontWeight: "600", marginBottom: "8px", color: INK }}>Datum</div>
          <input type="date" value={draft.datum} onChange={(e) => setD("datum", e.target.value)} style={{ width: "100%", borderRadius: "8px", fontSize: "14px", padding: "10px", background: MIST, border: `1px solid ${LINEC}`, color: INK, outline: "none" }} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "14px", fontWeight: "600", marginBottom: "8px", color: INK }}>Thema</div>
          <input type="text" value={draft.context} onChange={(e) => setD("context", e.target.value)} placeholder="Bijv: klantwerking" style={{ width: "100%", borderRadius: "8px", fontSize: "14px", padding: "10px", background: MIST, border: `1px solid ${LINEC}`, color: INK, outline: "none" }} />
        </div>
      </div>
      <Field label="Notitie" value={draft.transcript} onChange={(v) => setD("transcript", v)} rows={6} placeholder="Wat speelt deze week?" />
      {refError && <div style={{ background: REDT, color: "#8C3A33", borderRadius: "8px", padding: "16px", marginBottom: "16px", fontSize: "14px" }}>{refError}</div>}
      <button onClick={onReflect} disabled={refLoading} style={{ width: "100%", padding: "14px 0", background: refLoading ? "#D9988F" : RED, color: "#FFFFFF", border: "none", borderRadius: "12px", fontWeight: "600", cursor: refLoading ? "default" : "pointer" }}>
        {refLoading ? "Alexia kijkt mee..." : "Voeg toe"}
      </button>
    </div>

    <div style={{ background: INK, borderRadius: "12px", padding: "24px", marginBottom: "24px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
        <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "1px", color: "#E8B0AA" }}>RECAP, OM DE DAG</div>
        <button onClick={onRecap} disabled={recapLoading} style={{ fontSize: "14px", fontWeight: "600", borderRadius: "8px", padding: "8px 14px", background: recapLoading ? "#D9988F" : RED, color: "#FFFFFF", border: "none", cursor: recapLoading ? "default" : "pointer" }}>
          {recapLoading ? "Bezig..." : "Recap"}
        </button>
      </div>
      <p style={{ fontSize: "14px", marginBottom: "12px", color: ICE }}>Om de dag recap van je notities. {aantalRecent} notitie(s) in venster.</p>
      {recapError && <div style={{ background: REDT, color: "#8C3A33", borderRadius: "8px", padding: "12px", marginBottom: "12px", fontSize: "14px" }}>{recapError}</div>}
      {recap && (
        <div style={{ background: "#FFFFFF", borderRadius: "8px", padding: "16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
            <AlexiaAvatar size={28} />
            <div style={{ fontSize: "12px", color: SLATE }}>Alexia, {recap.datum}</div>
          </div>
          <Block title="Lessen" color={GREEN} items={recap.geleerde_lessen} />
          <Block title="Patronen" color={INK} items={recap.patronen} />
          <Block title="Uitdagingen" color={RED} items={recap.uitdagingen} />
        </div>
      )}
    </div>

    {loaded && entries.length === 0 && <div style={{ background: MIST, borderRadius: "12px", padding: "24px", textAlign: "center", color: SLATE, fontSize: "14px" }}>Nog geen notities.</div>}
    <div style={{ display: "grid", gap: "12px" }}>
      {entries.map((e) => (
        <div key={e.id} style={{ background: CARD, border: `0.5px solid ${LINEC}`, borderRadius: "12px", padding: "16px", boxShadow: "0 1px 3px rgba(34,48,42,0.06)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <AlexiaAvatar size={26} />
              <span style={{ fontSize: "14px", fontWeight: "600", color: INK }}>{e.datum}</span>
              {e.context && <span style={{ fontSize: "14px", color: SLATE }}>{e.context}</span>}
            </div>
            <button onClick={() => onDelete(e.id)} style={{ fontSize: "12px", color: SLATE, background: "none", border: "none", cursor: "pointer" }}>verwijderen</button>
          </div>
          <Block title="Leert" color={GREEN} items={e.geleerd} />
          <Block title="Bewezen" color={INK} items={e.bewezen} />
          <Block title="Niet goed" color={RED} items={e.wat_niet_goed} />
        </div>
      ))}
    </div>
  </div>;
}

function Over() {
  return <div style={{ background: CARD, borderRadius: "12px", border: `0.5px solid ${LINEC}`, padding: "24px", boxShadow: "0 1px 3px rgba(34,48,42,0.08)" }}>
    <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
      <AlexiaAvatar size={44} />
      <div style={{ fontSize: "18px", fontWeight: "600", color: INK }}>Dit is Alexia</div>
    </div>
    <p style={{ fontSize: "14px", marginBottom: "12px", color: INK }}>Alexia helpt je een richting kiezen om de code van kwartiermaken schaalbaar te maken.</p>
    <p style={{ fontSize: "14px", marginBottom: "12px", color: SLATE }}>Het Wekelijks Logboek is de motor. Elke dag noteer je wat speelt—voortgang, blockers, lessen. Alexia kijkt mee vanuit de kwartiermaken-code. Om de dag recap.</p>
    <p style={{ fontSize: "12px", marginTop: "24px", color: SLATE }}><strong>{VERSION}</strong></p>
  </div>;
}

function App() {
  const [tab, setTab] = useState("scenario");
  const [a, setA] = useState({ ambitie: 3, risico: 3, investering: 3, loslaten: 3, horizon: 3 });
  const [result, setResult] = useState(null);
  const [sLoading, setSLoading] = useState(false);
  const [sError, setSError] = useState(null);
  const [weeklyEntries, setWeeklyEntries] = useState([]);
  const [weeklyDraft, setWeeklyDraft] = useState({ datum: today(), context: "", transcript: "" });
  const [weeklyRefLoading, setWeeklyRefLoading] = useState(false);
  const [weeklyRefError, setWeeklyRefError] = useState(null);
  const [weeklyRecap, setWeeklyRecap] = useState(null);
  const [weeklyRecapLoading, setWeeklyRecapLoading] = useState(false);
  const [weeklyRecapError, setWeeklyRecapError] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const r = store.get("kw:scenario", null);
    const we = store.get("kw:weekly_entries", []);
    const wrc = store.get("kw:weekly_recap", null);
    if (r && r.answers) setA(r.answers);
    if (r && r.result) setResult(r.result);
    setWeeklyEntries(Array.isArray(we) ? we : []);
    if (wrc) setWeeklyRecap(wrc);
    setLoaded(true);
  }, []);

  const set = (k, v) => setA(p => ({ ...p, [k]: v }));
  const setD = (k, v) => setWeeklyDraft(p => ({ ...p, [k]: v }));

  const generate = async () => {
    setSLoading(true); setSError(null);
    try {
      const user = `Ambitie: ${a.ambitie}, Risico: ${a.risico}, Investering: ${a.investering}, Loslaten: ${a.loslaten}, Horizon: ${a.horizon}\n\nGeef diagnose en 3 scenario's als JSON.`;
      const parsed = parseJSON(await callClaude(CODE + "\n" + STYLE, user));
      setResult(parsed);
      store.set("kw:scenario", { answers: a, result: parsed });
    } catch (err) { setSError(err.message); }
    finally { setSLoading(false); }
  };

  const weeklyReflect = async () => {
    if (!weeklyDraft.transcript.trim()) return;
    setWeeklyRefLoading(true); setWeeklyRefError(null);
    try {
      const user = `Notitie:\n\n${weeklyDraft.transcript}\n\nGeef reflectie als JSON.`;
      const r = parseJSON(await callClaude(CODE + "\n" + STYLE, user));
      const entry = { ...r, id: uid(), datum: weeklyDraft.datum, context: weeklyDraft.context };
      const next = [entry, ...weeklyEntries];
      setWeeklyEntries(next);
      store.set("kw:weekly_entries", next);
      setWeeklyDraft({ datum: today(), context: "", transcript: "" });
    } catch (err) { setWeeklyRefError(err.message); }
    finally { setWeeklyRefLoading(false); }
  };

  const deleteWeeklyEntry = (id) => {
    const next = weeklyEntries.filter(e => e.id !== id);
    setWeeklyEntries(next);
    store.set("kw:weekly_entries", next);
  };

  const makeWeeklyRecap = async () => {
    setWeeklyRecapLoading(true); setWeeklyRecapError(null);
    try {
      const cutoff = dayStr(1);
      const recent = weeklyEntries.filter(e => e.datum >= cutoff);
      if (recent.length === 0) throw new Error("Geen notities van afgelopen twee dagen.");
      const body = recent.map(e => `${e.datum}: ${e.geleerd ? e.geleerd.join("; ") : ""}`).join("\n");
      const user = `Recap van:\n\n${body}\n\nGeef als JSON.`;
      const parsed = parseJSON(await callClaude(CODE + "\n" + STYLE, user));
      const saved = { ...parsed, datum: today(), aantal: recent.length };
      setWeeklyRecap(saved);
      store.set("kw:weekly_recap", saved);
    } catch (err) { setWeeklyRecapError(err.message); }
    finally { setWeeklyRecapLoading(false); }
  };

  const aantalRecent = weeklyEntries.filter(e => e.datum >= dayStr(1)).length;

  return (
    <div className="app">
      <div style={{ background: INK }}>
        <div style={{ maxWidth: "900px", margin: "0 auto", padding: "24px 20px 0" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "8px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <KwartierMark size={34} />
              <div style={{ fontSize: "12px", fontWeight: "700", letterSpacing: "2px", color: ICE }}>FRISO VAN ABBEMA</div>
            </div>
            <div style={{ fontSize: "12px", fontWeight: "600", color: ICE, opacity: 0.75 }}>{VERSION}</div>
          </div>
          <div style={{ fontSize: "18px", fontWeight: "700", lineHeight: 1.3, marginBottom: "8px", color: "#FFFFFF" }}>Scenario & Opschaling</div>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px" }}>
            <AlexiaAvatar size={22} />
            <div style={{ fontSize: "14px", color: ICE }}>met Alexia</div>
          </div>
          <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
            <Tab id="scenario" tab={tab} setTab={setTab}>Scenario</Tab>
            <Tab id="weekly" tab={tab} setTab={setTab}>Wekelijks Logboek</Tab>
            <Tab id="over" tab={tab} setTab={setTab}>Over</Tab>
          </div>
        </div>
      </div>
      <div style={{ maxWidth: "900px", margin: "0 auto", padding: "28px 20px 64px" }}>
        {tab === "scenario" && (result ? <ScenarioResult result={result} /> : <ScenarioIntake a={a} set={set} loading={sLoading} error={sError} onGenerate={generate} />)}
        {tab === "weekly" && <WeeklijksLogboek draft={weeklyDraft} setD={setD} onReflect={weeklyReflect} refLoading={weeklyRefLoading} refError={weeklyRefError} entries={weeklyEntries} onDelete={deleteWeeklyEntry} loaded={loaded} recap={weeklyRecap} onRecap={makeWeeklyRecap} recapLoading={weeklyRecapLoading} recapError={weeklyRecapError} aantalRecent={aantalRecent} />}
        {tab === "over" && <Over />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
